# =============================================================================
# configs/yazi/keymap.toml
# کلیدهای سفارشی yazi (بدون تکرار) / Custom yazi keybindings (deduplicated)
# =============================================================================

[[mgr.prepend_keymap]]
on   = ["g", "h"]
run  = "cd ~"
desc = "Go home"

[[mgr.prepend_keymap]]
on   = ["g", "c"]
run  = "cd ~/.config"
desc = "Go to config"

[[mgr.prepend_keymap]]
on   = ["T"]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on   = ["<C-d>"]
run  = "plugin diff"
desc = "Diff selected with hovered"

[[mgr.prepend_keymap]]
on   = ["<Enter>"]
run  = "plugin smart-enter"
desc = "Smart enter (enter dir or open file)"

[[mgr.prepend_keymap]]
on   = ["u"]
run  = "escape"
desc = "Cancel selection"

[[mgr.prepend_keymap]]
on   = ["z"]
run  = "plugin zoxide"
desc = "Jump with zoxide"

[[mgr.prepend_keymap]]
on   = ["f"]
run  = "plugin fzf"
desc = "Fuzzy find file"

[[mgr.prepend_keymap]]
on   = ["g", "g"]
run  = "shell --block 'lazygit'"
desc = "Open lazygit"
