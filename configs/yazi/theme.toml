# =============================================================================
# configs/yazi/theme.toml
# تم رنگی yazi با پالت Catppuccin Mocha / yazi color theme, Catppuccin Mocha palette
# =============================================================================

[mgr]
cwd = { fg = "#94e2d5" }

hovered         = { fg = "#1e1e2e", bg = "#89b4fa" }
preview_hovered = { underline = true }

find_keyword  = { fg = "#f9e2af", italic = true }
find_position = { fg = "#cba6f7", bg = "reset", italic = true }

marker_copied   = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut      = { fg = "#f38ba8", bg = "#f38ba8" }
marker_marked   = { fg = "#89b4fa", bg = "#89b4fa" }
marker_selected = { fg = "#f9e2af", bg = "#f9e2af" }

tab_active   = { fg = "#1e1e2e", bg = "#cba6f7" }
tab_inactive = { fg = "#cdd6f4", bg = "#313244" }
tab_width    = 1

border_symbol = "│"
border_style  = { fg = "#585b70" }

[mode]
normal_main = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
normal_alt  = { fg = "#89b4fa", bg = "#313244" }

select_main = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
select_alt  = { fg = "#a6e3a1", bg = "#313244" }

unset_main  = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }
unset_alt   = { fg = "#f38ba8", bg = "#313244" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#313244" }
progress_error  = { fg = "#f38ba8", bg = "#313244" }

perm_type  = { fg = "#89b4fa" }
perm_read  = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec  = { fg = "#a6e3a1" }
perm_sep   = { fg = "#585b70" }

[input]
border  = { fg = "#cba6f7" }
selected = { reversed = true }

[select]
border   = { fg = "#cba6f7" }
active   = { fg = "#f9e2af" }

[tasks]
border  = { fg = "#cba6f7" }
hovered = { underline = true }

[which]
mask            = { bg = "#1e1e2e" }
cand            = { fg = "#94e2d5" }
rest            = { fg = "#6c7086" }
desc            = { fg = "#cba6f7" }
separator       = "  "
separator_style = { fg = "#585b70" }

[help]
on      = { fg = "#94e2d5" }
run     = { fg = "#cba6f7" }
desc    = { fg = "#6c7086" }
hovered = { bg = "#313244", bold = true }
footer  = { fg = "#cdd6f4", bg = "#313244" }

[notify]
title_info  = { fg = "#a6e3a1" }
title_warn  = { fg = "#f9e2af" }
title_error = { fg = "#f38ba8" }

[mgr.syntect]
theme = "base16-ocean.dark"
