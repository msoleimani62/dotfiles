# =============================================================================
# configs/yazi/yazi.toml
# تنظیمات اصلی yazi (بدون داده‌ی شخصی) / Core yazi settings (no personal data)
# =============================================================================

[mgr]
ratio = [1, 3, 4]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 1200
max_height = 1200
cache_dir = ""
image_filter = "triangle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "unix" },
]
extract = [
  { run = 'unar "$1"', desc = "Extract here", for = "unix" },
]

[input]
cd_title = "Change directory:"
